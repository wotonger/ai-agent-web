<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习助手</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="brand">
                <div class="logo">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <span>学习助手</span>
            </div>

            <button class="new-chat" id="newChatBtn">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 5v14M5 12h14"/>
                </svg>
                新建对话
            </button>

            <div class="session-section">
                <p class="section-title">最近对话</p>
                <div class="session-list" id="sessionList">
                    <!-- Sessions loaded by JS -->
                </div>
            </div>

            <div class="mode-section">
                <p class="section-title">助手模式</p>
                <div class="mode-list">
                    <button class="mode-btn active" data-mode="code">
                        <span class="icon">💻</span>
                        <span class="text">写代码</span>
                    </button>
                    <button class="mode-btn" data-mode="document">
                        <span class="icon">📝</span>
                        <span class="text">写文档</span>
                    </button>
                    <button class="mode-btn" data-mode="course_design">
                        <span class="icon">🎓</span>
                        <span class="text">课程设计</span>
                    </button>
                    <button class="mode-btn" data-mode="general">
                        <span class="icon">💬</span>
                        <span class="text">通用问答</span>
                    </button>
                </div>
            </div>
        </aside>

        <main class="chat-container">
            <header class="chat-header">
                <div class="current-mode">
                    <span id="modeIcon">💻</span>
                    <span id="modeLabel">写代码</span>
                </div>
                <div class="status" id="status">准备就绪</div>
            </header>

            <div class="messages" id="messages">
                <div class="welcome">
                    <h2>今天想学什么？</h2>
                    <p>我可以帮你写代码、改 Bug、写论文、规划课程设计。</p>
                    <div class="quick-actions">
                        <button class="quick-btn" data-prompt="帮我写一个 Python 学生成绩管理系统的核心代码">Python 成绩管理系统</button>
                        <button class="quick-btn" data-prompt="帮我写一篇关于人工智能在教育中应用的课程论文大纲">AI 教育应用论文大纲</button>
                        <button class="quick-btn" data-prompt="帮我规划一个基于 Django 的在线商城课程设计">Django 商城课程设计</button>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-box">
                    <textarea
                        id="userInput"
                        placeholder="输入你的问题，Shift+Enter 换行..."
                        rows="1"
                    ></textarea>
                    <button class="send-btn" id="sendBtn" disabled>
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                        </svg>
                    </button>
                </div>
                <p class="footer-note">AI 生成内容仅供参考，请认真核对</p>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
